<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>시시콜콜 서비스</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            overflow-x: hidden;
        }

        body {
            font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
            color: #162033;
            background:
                radial-gradient(circle at 12% 8%, rgba(72, 187, 255, 0.26), transparent 30%),
                radial-gradient(circle at 88% 14%, rgba(255, 183, 77, 0.22), transparent 28%),
                linear-gradient(135deg, #eef5ff 0%, #f8fbff 42%, #f4f7f1 100%);
        }

        button,
        input {
            font: inherit;
        }

        input[type="file"] {
            font-size: 13px;
        }

        .shell {
            width: min(430px, 100%);
            min-height: 100dvh;
            margin: 0 auto;
            padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
            display: flex;
            align-items: stretch;
        }

        .intro {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(218, 226, 240, 0.95);
            border-radius: 8px;
            box-shadow: 0 18px 45px rgba(22, 32, 51, 0.12);
        }

        .intro {
            width: 100%;
            min-height: calc(100dvh - 28px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .top-actions {
            position: fixed;
            top: max(26px, calc(env(safe-area-inset-top) + 14px));
            right: max(24px, calc(env(safe-area-inset-right) + 14px));
            z-index: 20;
        }

        .brand-row {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 14px;
            min-height: 46px;
            padding-right: 66px;
        }

        .eyebrow {
            margin: 0 0 8px;
            color: #4b637f;
            font-size: 13px;
            font-weight: 800;
        }

        h1 {
            margin: 0;
            font-size: clamp(34px, 10vw, 48px);
            line-height: 1.05;
            letter-spacing: 0;
        }

        .summary {
            max-width: 680px;
            margin: 0;
            color: #506176;
            font-size: 15px;
            line-height: 1.6;
        }

        .primary-actions {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 10px;
        }

        .primary-btn,
        .ghost-btn,
        .settings-toggle,
        .close-btn,
        .save-btn,
        .backup-btn,
        .feature-button {
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 900;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .primary-btn,
        .settings-toggle,
        .save-btn,
        .backup-btn {
            background: #2563eb;
            color: #ffffff;
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.24);
        }

        .primary-btn {
            padding: 14px 18px;
            font-size: 16px;
        }

        .ghost-btn {
            padding: 14px 18px;
            background: #edf3fb;
            color: #26364d;
        }

        .settings-toggle {
            width: 46px;
            height: 46px;
            padding: 11px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(214, 224, 238, 0.95);
            box-shadow: 0 10px 22px rgba(22, 32, 51, 0.16);
        }

        .settings-toggle img {
            width: 22px;
            height: 22px;
            display: block;
        }

        .close-btn {
            width: 36px;
            height: 36px;
            background: #edf3fb;
            color: #26364d;
            font-size: 20px;
            line-height: 1;
        }

        .primary-btn:hover,
        .ghost-btn:hover,
        .settings-toggle:hover,
        .close-btn:hover,
        .save-btn:hover,
        .backup-btn:hover,
        .feature-button:hover {
            transform: translateY(-2px);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: auto;
        }

        .feature-button {
            min-height: 86px;
            padding: 15px 14px;
            border: 1px solid #dbe5f1;
            background: #ffffff;
            color: #172033;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .feature-button[disabled] {
            cursor: not-allowed;
            opacity: 0.62;
            transform: none;
        }

        .feature-button:focus-visible,
        .primary-btn:focus-visible,
        .ghost-btn:focus-visible,
        .settings-toggle:focus-visible,
        .close-btn:focus-visible,
        .save-btn:focus-visible,
        .backup-btn:focus-visible,
        input:focus-visible {
            outline: 3px solid rgba(37, 99, 235, 0.28);
            outline-offset: 2px;
        }

        .feature-icon {
            flex: 0 0 auto;
            font-size: 27px;
            line-height: 1;
        }

        .feature-title {
            display: block;
            margin-bottom: 4px;
            font-size: 16px;
            font-weight: 900;
        }

        .feature-meta {
            display: block;
            color: #68788d;
            font-size: 12px;
            line-height: 1.35;
        }

        .settings-backdrop {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: flex;
            justify-content: flex-end;
            background: rgba(22, 32, 51, 0.32);
            opacity: 1;
            transition: opacity 0.18s ease;
        }

        .settings-backdrop.hidden {
            pointer-events: none;
            opacity: 0;
        }

        .settings {
            width: min(420px, calc(100% - 22px));
            min-height: 100dvh;
            padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: rgba(255, 255, 255, 0.98);
            border-left: 1px solid rgba(218, 226, 240, 0.95);
            box-shadow: -18px 0 45px rgba(22, 32, 51, 0.18);
            transform: translateX(0);
            transition: transform 0.18s ease;
        }

        .settings-backdrop.hidden .settings {
            transform: translateX(100%);
        }

        .settings-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .settings h2 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 0;
        }

        .settings-note {
            margin: -8px 0 0;
            color: #5f7085;
            font-size: 14px;
            line-height: 1.6;
        }

        .setting-group {
            display: grid;
            gap: 12px;
        }

        .setting-row {
            display: grid;
            gap: 7px;
        }

        label {
            color: #34445a;
            font-size: 13px;
            font-weight: 900;
        }

        input {
            width: 100%;
            border: 1px solid #d7e0ec;
            border-radius: 8px;
            background: #f8fbff;
            color: #162033;
            padding: 12px 13px;
            font-size: 14px;
        }

        input::placeholder {
            color: #9aabba;
        }

        .api-list {
            display: grid;
            gap: 8px;
            padding: 12px;
            border: 1px solid #dbe5f1;
            border-radius: 8px;
            background: #f8fbff;
        }

        .api-item {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: #394a60;
            font-size: 13px;
            font-weight: 800;
        }

        .api-state {
            color: #0f7a4f;
        }

        .save-line {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .save-btn {
            padding: 12px 16px;
        }

        .backup-box {
            display: grid;
            gap: 10px;
            padding: 12px;
            border: 1px solid #dbe5f1;
            border-radius: 8px;
            background: #f8fbff;
        }

        .backup-title {
            color: #34445a;
            font-size: 13px;
            font-weight: 900;
        }

        .backup-desc {
            margin: 0;
            color: #5f7085;
            font-size: 13px;
            line-height: 1.5;
        }

        .backup-btn {
            min-height: 42px;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 900;
        }

        .restore-row {
            display: grid;
            gap: 8px;
        }

        .save-status {
            min-height: 20px;
            color: #0f7a4f;
            font-size: 13px;
            font-weight: 900;
        }

        .footer-link {
            margin-top: auto;
            color: #65768b;
            font-size: 12px;
            line-height: 1.5;
        }

        @media (min-width: 760px) {
            .shell {
                width: min(980px, 100%);
                padding: 28px;
            }

            .intro {
                min-height: calc(100dvh - 56px);
                padding: 30px;
                gap: 22px;
            }

            .feature-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .feature-button {
                min-height: 128px;
                padding: 15px 12px;
                display: grid;
                align-content: space-between;
                gap: 12px;
            }

            .summary {
                font-size: 16px;
                line-height: 1.7;
            }
        }

        @media (max-width: 640px) {
            .shell {
                padding: max(12px, env(safe-area-inset-top)) 10px max(12px, env(safe-area-inset-bottom));
            }

            .intro {
                min-height: calc(100dvh - 24px);
                padding: 18px;
            }

            .settings {
                width: min(100%, calc(100% - 12px));
                padding: 18px;
            }

            .brand-row {
                align-items: center;
                padding-right: 66px;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }

            .feature-button {
                min-height: 84px;
            }

            .primary-actions,
            .save-line {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .save-line {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 374px) {
            .intro {
                gap: 14px;
                padding: 16px;
            }

            .summary {
                font-size: 14px;
            }

            .primary-btn,
            .ghost-btn {
                padding: 12px 10px;
                font-size: 14px;
            }

            .feature-button {
                min-height: 78px;
                padding: 11px;
            }

            .feature-icon {
                font-size: 24px;
            }

            .feature-title {
                font-size: 15px;
            }

            .feature-meta {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="top-actions">
        <button id="settingsOpenButton" class="settings-toggle" type="button" aria-label="설정 열기" aria-controls="settingsPanel" aria-expanded="false">
            <img alt="" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z'/%3E%3Cpath d='M19.4 15a1.7 1.7 0 0 0 .34 1.88l.05.05a2.05 2.05 0 1 1-2.9 2.9l-.05-.05a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1 1.55V21a2.05 2.05 0 1 1-4.1 0v-.07a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.88.34l-.05.05a2.05 2.05 0 1 1-2.9-2.9l.05-.05A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2.05 2.05 0 1 1 0-4.1h.07a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.88l-.05-.05a2.05 2.05 0 1 1 2.9-2.9l.05.05A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2.05 2.05 0 1 1 4.1 0v.07a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.88-.34l.05-.05a2.05 2.05 0 1 1 2.9 2.9l-.05.05A1.7 1.7 0 0 0 19.4 9c.23.6.8 1 1.55 1H21a2.05 2.05 0 1 1 0 4.1h-.07a1.7 1.7 0 0 0-1.55 1Z'/%3E%3C/svg%3E" />
        </button>
    </div>

    <main class="shell">
        <section class="intro" aria-labelledby="appTitle">
            <div class="brand-row">
                <div>
                    <h1 id="appTitle">시시콜콜 서비스</h1>
                </div>
            </div>

            <div class="feature-grid" aria-label="연결 선택">
                <button class="feature-button" type="button" data-link="app.html">
                    <span class="feature-icon" aria-hidden="true">🌿</span>
                    <span><span class="feature-title">All 라이프</span><span class="feature-meta">생활 정보 대시보드</span></span>
                </button>
                <button class="feature-button" type="button" data-link="calculator.html">
                    <span class="feature-icon" aria-hidden="true">🧮</span>
                    <span><span class="feature-title">All 계산기</span><span class="feature-meta">계산기 화면</span></span>
                </button>
                <button class="feature-button" type="button" data-link="calendar.html">
                    <span class="feature-icon" aria-hidden="true">📅</span>
                    <span><span class="feature-title">All 캘린더</span><span class="feature-meta">일정 관리 화면</span></span>
                </button>
                <button class="feature-button" type="button" data-link="memo.html">
                    <span class="feature-icon" aria-hidden="true">📝</span>
                    <span><span class="feature-title">All 메모장</span><span class="feature-meta">메모 작성 화면</span></span>
                </button>
                <button class="feature-button" type="button" disabled>
                    <span class="feature-icon" aria-hidden="true">＋</span>
                    <span><span class="feature-title">추후 추가</span><span class="feature-meta">새 기능 준비 중</span></span>
                </button>
            </div>
        </section>

        <div id="settingsLayer" class="settings-backdrop hidden" aria-hidden="true">
        <aside id="settingsPanel" class="settings" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
            <div class="settings-head">
                <h2 id="settingsTitle">API 설정</h2>
                <button id="settingsCloseButton" class="close-btn" type="button" aria-label="설정 닫기">×</button>
            </div>
            <p class="settings-note">현재 기본 데이터는 공개 API로 불러오며 별도 키 없이 동작합니다. 추가 연동 값은 이 브라우저에 저장됩니다.</p>

            <div class="api-list" aria-label="기본 API 상태">
                <div class="api-item"><span>Open-Meteo 날씨</span><span class="api-state">키 불필요</span></div>
                <div class="api-item"><span>Open-Meteo 대기질</span><span class="api-state">키 불필요</span></div>
                <div class="api-item"><span>USGS 지진</span><span class="api-state">키 불필요</span></div>
                <div class="api-item"><span>BigDataCloud 위치명</span><span class="api-state">키 불필요</span></div>
            </div>

            <form id="settingsForm" class="setting-group">
                <div class="setting-row">
                    <label for="apiKeys">API 키</label>
                    <input id="apiKeys" name="apiKeys" type="text" autocomplete="off" placeholder="예: key-one, key-two, key-three" />
                </div>
                <div class="setting-row">
                    <label for="defaultLocation">기본 위치명</label>
                    <input id="defaultLocation" name="defaultLocation" type="text" autocomplete="off" placeholder="예: 서울특별시 중구" />
                </div>
                <div class="save-line">
                    <button class="save-btn" type="submit">설정 저장</button>
                    <span id="saveStatus" class="save-status" role="status" aria-live="polite"></span>
                </div>
            </form>

            <div class="backup-box">
                <div class="backup-title">LocalStorage 백업</div>
                <p class="backup-desc">설정, 캘린더 메모, 메모장 저장 내역을 JSON 파일로 다운로드하거나 복원합니다.</p>
                <button id="downloadBackupButton" class="backup-btn" type="button">백업 다운로드</button>
                <div class="restore-row">
                    <input id="backupFileInput" type="file" accept="application/json,.json" />
                    <button id="restoreBackupButton" class="backup-btn" type="button">백업 업로드</button>
                </div>
            </div>

            <div class="footer-link">저장 위치: 현재 브라우저 localStorage</div>
        </aside>
        </div>
    </main>

    <script>
        const storageKey = "sisicolcol.settings";
        const form = document.getElementById("settingsForm");
        const saveStatus = document.getElementById("saveStatus");
        const settingsLayer = document.getElementById("settingsLayer");
        const settingsOpenButton = document.getElementById("settingsOpenButton");
        const settingsCloseButton = document.getElementById("settingsCloseButton");
        const downloadBackupButton = document.getElementById("downloadBackupButton");
        const backupFileInput = document.getElementById("backupFileInput");
        const restoreBackupButton = document.getElementById("restoreBackupButton");

        function loadSettings() {
            try {
                const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");

                Object.entries(saved).forEach(([key, value]) => {
                    const field = form.elements[key];

                    if (field) {
                        field.value = value;
                    }
                });
            } catch (error) {
                localStorage.removeItem(storageKey);
            }
        }

        function saveSettings() {
            const data = Object.fromEntries(new FormData(form).entries());
            data.apiKeys = (data.apiKeys || "")
                .split(",")
                .map((key) => key.trim())
                .filter(Boolean)
                .join(", ");

            localStorage.setItem(storageKey, JSON.stringify(data));
            form.elements.apiKeys.value = data.apiKeys;
            showSettingsStatus("저장되었습니다.");
        }

        function openSettings() {
            settingsLayer.classList.remove("hidden");
            settingsLayer.setAttribute("aria-hidden", "false");
            settingsOpenButton.setAttribute("aria-expanded", "true");
            window.setTimeout(() => {
                form.elements.apiKeys.focus();
            }, 0);
        }

        function closeSettings() {
            settingsLayer.classList.add("hidden");
            settingsLayer.setAttribute("aria-hidden", "true");
            settingsOpenButton.setAttribute("aria-expanded", "false");
            settingsOpenButton.focus();
        }

        function openPage(url) {
            window.location.href = url;
        }

        function downloadLocalStorageBackup() {
            const backup = {
                app: "sisicolcol",
                exportedAt: new Date().toISOString(),
                items: {}
            };

            for (let index = 0; index < localStorage.length; index += 1) {
                const key = localStorage.key(index);

                if (key && key.startsWith("sisicolcol.")) {
                    try {
                        backup.items[key] = JSON.parse(localStorage.getItem(key));
                    } catch (error) {
                        backup.items[key] = localStorage.getItem(key);
                    }
                }
            }

            const blob = new Blob([JSON.stringify(backup, null, 2)], {
                type: "application/json"
            });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            const dateText = new Date().toISOString().slice(0, 10);

            link.href = url;
            link.download = `sisicolcol-backup-${dateText}.json`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);

            showSettingsStatus("백업 파일을 다운로드했습니다.");
        }

        function showSettingsStatus(message) {
            saveStatus.textContent = message;
            window.setTimeout(() => {
                saveStatus.textContent = "";
            }, 1800);
        }

        function restoreLocalStorageBackup() {
            const file = backupFileInput.files && backupFileInput.files[0];

            if (!file) {
                showSettingsStatus("백업 파일을 선택해주세요.");
                return;
            }

            const reader = new FileReader();

            reader.addEventListener("load", () => {
                try {
                    const backup = JSON.parse(String(reader.result || "{}"));
                    const items = backup.items;

                    if (!items || typeof items !== "object" || Array.isArray(items)) {
                        throw new Error("invalid backup");
                    }

                    let restoredCount = 0;

                    Object.entries(items).forEach(([key, value]) => {
                        if (!key.startsWith("sisicolcol.")) {
                            return;
                        }

                        localStorage.setItem(key, JSON.stringify(value));
                        restoredCount += 1;
                    });

                    loadSettings();
                    backupFileInput.value = "";
                    showSettingsStatus(`${restoredCount}개 항목을 복원했습니다.`);
                } catch (error) {
                    showSettingsStatus("백업 파일을 확인해주세요.");
                }
            });

            reader.readAsText(file);
        }

        document.querySelectorAll("[data-link]").forEach((button) => {
            button.addEventListener("click", () => {
                openPage(button.dataset.link);
            });
        });

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            saveSettings();
        });

        settingsOpenButton.addEventListener("click", openSettings);
        settingsCloseButton.addEventListener("click", closeSettings);
        downloadBackupButton.addEventListener("click", downloadLocalStorageBackup);
        restoreBackupButton.addEventListener("click", restoreLocalStorageBackup);
        settingsLayer.addEventListener("click", (event) => {
            if (event.target === settingsLayer) {
                closeSettings();
            }
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && !settingsLayer.classList.contains("hidden")) {
                closeSettings();
            }
        });

        loadSettings();
    </script>
</body>
</html>
